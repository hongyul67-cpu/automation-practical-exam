<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>자동화설비기능사 실기 · 공개도면 문제 게임</title>
<style>
  :root{
    --bg:#0E1D2B; --panel:#15293C; --panel2:#102130; --border:#264257;
    --line:#E9EEF3; --amber:#F2A93B; --cyan:#4FD1E8; --green:#57D68D;
    --red:#EA5B62; --text:#EAF1F6; --sub:#8FA8BC;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    background-image:
      linear-gradient(rgba(79,209,232,0.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(79,209,232,0.05) 1px,transparent 1px);
    background-size:24px 24px;
  }
  .wrap{max-width:860px;margin:0 auto;padding:18px 14px 60px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .brand{font-size:12px;color:var(--cyan);letter-spacing:1px;font-weight:700}
  h1{font-size:20px;margin:2px 0 0}
  .sub{font-size:12px;color:var(--sub)}
  .spacer{flex:1}
  button{font-family:inherit;cursor:pointer}
  .btn{background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:9px 14px;font-size:14px;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--cyan)}
  .btn.amber{background:var(--amber);color:#1A1200;border:none}
  .btn.cyan{background:var(--cyan);color:#04222B;border:none}
  .btn.ghost{background:transparent}
  .btn:disabled{opacity:.4;cursor:default}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.cards{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:16px;text-align:left;transition:.15s}
  .card:hover{border-color:var(--amber);transform:translateY(-2px)}
  .card .ic{font-size:26px}
  .card .t{font-size:16px;font-weight:700;margin-top:6px}
  .card .d{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.5}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
  .hr{height:1px;background:var(--border);margin:14px 0}
  .imgbox{background:#fff;border-radius:8px;padding:6px;position:relative;cursor:zoom-in}
  .imgbox img{width:100%;display:block;border-radius:4px}
  .zoomhint{position:absolute;right:8px;bottom:8px;background:rgba(14,29,43,.82);color:#fff;
    font-size:11px;padding:3px 8px;border-radius:20px;pointer-events:none}
  .q{font-size:16px;font-weight:600;margin:14px 0 10px;line-height:1.5}
  .choices{display:grid;gap:9px}
  .choice{background:var(--panel2);border:2px solid var(--border);border-radius:9px;
    padding:12px 14px;font-size:15px;color:var(--text);text-align:left;transition:.12s}
  .choice:hover{border-color:var(--cyan)}
  .choice.correct{border-color:var(--green);background:rgba(87,214,141,.16)}
  .choice.wrong{border-color:var(--red);background:rgba(234,91,98,.14)}
  .choice.dim{opacity:.5}
  .isoopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .isoopt{background:#fff;border:3px solid var(--border);border-radius:10px;padding:4px;transition:.12s}
  .isoopt:hover{border-color:var(--cyan)}
  .isoopt img{width:100%;display:block;height:130px;object-fit:contain}
  .isoopt.correct{border-color:var(--green)}
  .isoopt.wrong{border-color:var(--red)}
  .feedback{margin-top:12px;padding:12px;border-radius:9px;font-size:14px;line-height:1.55;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:rgba(87,214,141,.12);border:1px solid var(--green)}
  .feedback.no{background:rgba(234,91,98,.12);border:1px solid var(--red)}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .pill{font-size:12px;color:var(--sub);background:var(--panel2);border:1px solid var(--border);
    padding:4px 10px;border-radius:20px}
  .numin{background:var(--panel2);border:2px solid var(--border);border-radius:9px;color:var(--text);
    font-size:22px;font-weight:700;padding:10px 14px;width:150px;text-align:center;font-family:ui-monospace,Menlo,monospace}
  .numin:focus{outline:none;border-color:var(--cyan)}
  .unit{font-size:16px;color:var(--sub)}
  .progress{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;margin:8px 0 0}
  .progress>i{display:block;height:100%;background:var(--amber);transition:.3s}
  .statgrid{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin:16px 0}
  .statgrid .n{font-size:28px;font-weight:800}
  .statgrid .l{font-size:12px;color:var(--sub);text-align:center}
  /* editor */
  .ed-list{display:grid;gap:8px}
  .ed-item{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;
    display:flex;align-items:center;gap:10px}
  .ed-item .th{width:54px;height:40px;background:#fff;border-radius:5px;object-fit:contain}
  input[type=text],textarea,select{background:var(--panel2);border:1px solid var(--border);border-radius:7px;
    color:var(--text);font-family:inherit;font-size:14px;padding:8px 10px;width:100%}
  textarea{resize:vertical;min-height:38px}
  label{font-size:12px;color:var(--sub);display:block;margin:8px 0 3px}
  .qedit{border:1px solid var(--border);border-radius:9px;padding:10px;margin-top:8px;background:var(--panel2)}
  .tag{font-size:11px;color:var(--amber);font-weight:700}
  .link{color:var(--cyan);font-size:13px;background:none;border:none;padding:0;text-decoration:underline}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--green);color:#04222B;
    padding:10px 18px;border-radius:22px;font-weight:700;font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(6,12,20,.94);z-index:80;display:none;
    flex-direction:column}
  .lb.show{display:flex}
  .lb .bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;color:#fff}
  .lb .canvas{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center}
  .lb img{max-width:none}
  .mono{font-family:ui-monospace,Menlo,monospace}
  .warn{font-size:12px;color:var(--amber);background:rgba(242,169,59,.1);border:1px solid var(--amber);
    border-radius:8px;padding:8px 10px;margin-top:10px;line-height:1.5}
  a.plain{color:var(--cyan)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>
<div class="lb" id="lb">
  <div class="bar">
    <span class="sub" id="lbcap">도면</span>
    <div class="row">
      <button class="btn ghost" style="color:#fff" onclick="lbZoom(-1)">－</button>
      <button class="btn ghost" style="color:#fff" onclick="lbZoom(1)">＋</button>
      <button class="btn amber" onclick="closeLB()">닫기 ✕</button>
    </div>
  </div>
  <div class="canvas" id="lbcanvas"><img id="lbimg" src="" alt="" /></div>
</div>

<script src="data.js"></script>
<!-- 결과 수집 위젯: 교사가 공유링크에 ?rc=<Apps Script exec URL> 를 붙이면 제출 활성화 -->
<script src="https://hongyul67-cpu.github.io/result-collector/collector.js"
        data-tool="자동화설비 실기 도면게임"></script>
<script>
/* 결과제출 기본 도구명(모드별 탭 구분용 베이스) */
const RC_BASE=(window.ResultCollector&&ResultCollector.config&&ResultCollector.config.tool)||"자동화설비 실기 도면게임";
/* ---------------- data layer ---------------- */
const LS_KEY="apx_data_v1";
const IMG=id=>`images/${id}.png`;
const ISO=id=>`images/iso/${id}.png`;
const VIEWS=id=>`images/views/${id}.png`;

function loadData(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){const d=JSON.parse(raw); if(Array.isArray(d)&&d.length)return d;}
  }catch(e){}
  return JSON.parse(JSON.stringify(window.DEFAULT_DRAWINGS));
}
function saveData(d){ localStorage.setItem(LS_KEY,JSON.stringify(d)); }
function resetData(){ localStorage.removeItem(LS_KEY); }
let DATA=loadData();

/* ---------------- helpers ---------------- */
const $=id=>document.getElementById(id);
const app=$("app");
const rint=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=rint(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* quiz pool = every quiz across drawings ; dims pool = every dim */
function quizPool(){const p=[];DATA.forEach(d=>(d.quiz||[]).forEach((q,i)=>p.push({...q,did:d.id,dname:d.name})));return p;}
function dimPool(){const p=[];DATA.forEach(d=>(d.dims||[]).forEach((q,i)=>p.push({...q,did:d.id,dname:d.name})));return p;}

/* ---------------- lightbox ---------------- */
let lbScale=1;
function openLB(src,cap){lbScale=1;$("lbimg").src=src;$("lbimg").style.width="auto";$("lbcap").textContent=cap||"도면";$("lb").classList.add("show");}
function closeLB(){$("lb").classList.remove("show");}
function lbZoom(dir){lbScale=Math.max(.4,Math.min(4,lbScale+dir*0.3));const im=$("lbimg");im.style.width=(im.naturalWidth*lbScale)+"px";}
$("lb").addEventListener("click",e=>{if(e.target.id==="lb"||e.target.id==="lbcanvas")closeLB();});

/* ---------------- routing ---------------- */
function go(view,arg){window.scrollTo(0,0);({home:renderHome,quiz:renderQuiz,match:renderMatch,dim:renderDim,edit:renderEditor,editOne:renderEditOne}[view]||renderHome)(arg);}

function header(title,sub){
  return `<div class="top">
    <div><div class="brand">자동화설비기능사 · 실기 대비</div>
    <h1>${esc(title)}</h1><div class="sub">${esc(sub||"")}</div></div>
    <div class="spacer"></div>
    <button class="btn ghost" onclick="go('home')">← 홈</button></div>`;
}

/* ---------------- HOME ---------------- */
function renderHome(){
  const nQ=quizPool().length, nD=dimPool().length, nDraw=DATA.length;
  app.innerHTML=`
  <div class="top">
    <div><div class="brand">AUTOMATION EQUIPMENT · PRACTICAL</div>
    <h1>공개도면 문제 게임</h1>
    <div class="sub">자동화설비기능사 실기 대비 · 도면 읽기 훈련</div></div>
    <div class="spacer"></div>
    <button class="btn ghost" onclick="go('edit')">⚙ 문제 편집</button>
  </div>
  <div class="row" style="margin-bottom:12px">
    <span class="pill">도면 ${nDraw}장</span>
    <span class="pill">해독 문제 ${nQ}개</span>
    <span class="pill">치수 문제 ${nD}개</span>
  </div>
  <div class="cards">
    <button class="card" onclick="go('quiz')">
      <div class="ic">📐</div><div class="t">① 도면 해독 퀴즈</div>
      <div class="d">실제 공개도면을 보고 기호·구멍 개수·주서를 4지선다로 푼다.</div></button>
    <button class="card" onclick="go('match')">
      <div class="ic">🧊</div><div class="t">③ 3면도 ↔ 3D 매칭</div>
      <div class="d">정면·평면·측면도를 보고 알맞은 등각투상(3D) 형상을 고른다.</div></button>
    <button class="card" onclick="go('dim')">
      <div class="ic">🔢</div><div class="t">④ 모델링 치수 찾기</div>
      <div class="d">모델링에 필요한 치수를 도면에서 찾아 숫자로 입력한다.</div></button>
    <button class="card" onclick="go('edit')">
      <div class="ic">✏️</div><div class="t">문제 편집 · 추가</div>
      <div class="d">선생님용. 문제·정답 수정, 도면 추가, JSON 내보내기/불러오기.</div></button>
  </div>
  <div class="warn">💡 도면 이미지를 누르면 크게 확대해서 볼 수 있어요. 초안 문제이니 편집 화면에서 검수·보완하세요.</div>`;
}

/* ---------------- MODE 1 : QUIZ ---------------- */
let qState=null, sessStart=0;
function renderQuiz(){
  const pool=shuffle(quizPool());
  if(!pool.length){app.innerHTML=header("도면 해독 퀴즈")+`<div class="panel">등록된 문제가 없습니다. 편집 화면에서 추가하세요.</div>`;return;}
  qState={pool,i:0,correct:0,answered:false}; sessStart=Date.now();
  drawQuiz();
}
function drawQuiz(){
  const s=qState, q=s.pool[s.i];
  app.innerHTML=header("① 도면 해독 퀴즈",`도면 ${q.did} · ${q.dname}`)+`
  <div class="panel">
    <div class="imgbox" onclick="openLB('${IMG(q.did)}','${esc(q.did+" "+q.dname)}')">
      <img src="${IMG(q.did)}" alt="도면 ${q.did}"><span class="zoomhint">🔍 눌러서 확대</span>
    </div>
    <div class="q">${esc(q.q)}</div>
    <div class="choices" id="choices">
      ${q.choices.map((c,i)=>`<button class="choice" data-i="${i}" onclick="answerQuiz(${i})">${esc(c)}</button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <div class="row" style="margin-top:14px">
      <span class="pill">${s.i+1} / ${s.pool.length}</span>
      <span class="pill">맞힘 ${s.correct}</span>
      <div class="spacer"></div>
      <button class="btn amber" id="nextb" style="display:none" onclick="nextQuiz()">다음 →</button>
    </div>
    <div class="progress"><i style="width:${(s.i)/s.pool.length*100}%"></i></div>
  </div>`;
}
function answerQuiz(i){
  const s=qState; if(s.answered)return; s.answered=true;
  const q=s.pool[s.i], ok=i===q.answer;
  if(ok)s.correct++;
  document.querySelectorAll("#choices .choice").forEach(b=>{
    const bi=+b.dataset.i;
    if(bi===q.answer)b.classList.add("correct");
    else if(bi===i)b.classList.add("wrong");
    else b.classList.add("dim");
    b.style.pointerEvents="none";
  });
  const fb=$("fb");
  fb.className="feedback show "+(ok?"ok":"no");
  fb.innerHTML=(ok?"✅ 정답! ":"❌ 오답. 정답: <b>"+esc(q.choices[q.answer])+"</b><br>")+esc(q.explain||"");
  $("nextb").style.display="";
}
function nextQuiz(){
  const s=qState; s.i++; s.answered=false;
  if(s.i>=s.pool.length){finishSession("① 도면 해독 퀴즈",s.correct,s.pool.length,"quiz");return;}
  drawQuiz();
}

/* ---------------- MODE 3 : MATCH ---------------- */
let mState=null;
function renderMatch(){
  if(DATA.length<4){app.innerHTML=header("3면도 ↔ 3D 매칭")+`<div class="panel">매칭에는 도면이 4장 이상 필요합니다.</div>`;return;}
  mState={order:shuffle(DATA.map(d=>d.id)),i:0,correct:0,answered:false}; sessStart=Date.now();
  drawMatch();
}
function drawMatch(){
  const s=mState, id=s.order[s.i], d=DATA.find(x=>x.id===id);
  const others=shuffle(DATA.filter(x=>x.id!==id)).slice(0,3).map(x=>x.id);
  const opts=shuffle([id,...others]);
  s.correctId=id; s.opts=opts;
  app.innerHTML=header("③ 3면도 ↔ 3D 매칭",`이 도면(3면도)에 맞는 3D 형상은?`)+`
  <div class="panel">
    <div class="imgbox" onclick="openLB('${VIEWS(id)}','${esc(id+" 3면도")}')">
      <img src="${VIEWS(id)}" alt="3면도"><span class="zoomhint">🔍 눌러서 확대</span>
    </div>
    <div class="q">위 3면도와 일치하는 등각투상(3D) 형상을 고르세요.</div>
    <div class="isoopts" id="isoopts">
      ${opts.map(oid=>`<button class="isoopt" data-id="${oid}" onclick="answerMatch('${oid}')">
        <img src="${ISO(oid)}" alt="3D"></button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <div class="row" style="margin-top:14px">
      <span class="pill">${s.i+1} / ${s.order.length}</span>
      <span class="pill">맞힘 ${s.correct}</span>
      <div class="spacer"></div>
      <button class="btn amber" id="nextb" style="display:none" onclick="nextMatch()">다음 →</button>
    </div>
    <div class="progress"><i style="width:${(s.i)/s.order.length*100}%"></i></div>
  </div>`;
}
function answerMatch(oid){
  const s=mState; if(s.answered)return; s.answered=true;
  const ok=oid===s.correctId; if(ok)s.correct++;
  document.querySelectorAll("#isoopts .isoopt").forEach(b=>{
    if(b.dataset.id===s.correctId)b.classList.add("correct");
    else if(b.dataset.id===oid)b.classList.add("wrong");
    b.style.pointerEvents="none";
  });
  const d=DATA.find(x=>x.id===s.correctId);
  const fb=$("fb");fb.className="feedback show "+(ok?"ok":"no");
  fb.innerHTML=(ok?"✅ 정답! ":"❌ 오답. ")+`정답은 <b>도면 ${esc(d.id)} · ${esc(d.name)}</b> 입니다.`;
  $("nextb").style.display="";
}
function nextMatch(){
  const s=mState;s.i++;s.answered=false;
  if(s.i>=s.order.length){finishSession("③ 3면도 ↔ 3D 매칭",s.correct,s.order.length,"match");return;}
  drawMatch();
}

/* ---------------- MODE 4 : DIMENSION ---------------- */
let dState=null;
function renderDim(){
  const pool=shuffle(dimPool());
  if(!pool.length){app.innerHTML=header("모델링 치수 찾기")+`<div class="panel">등록된 치수 문제가 없습니다.</div>`;return;}
  dState={pool,i:0,correct:0,answered:false,tries:0}; sessStart=Date.now();
  drawDim();
}
function drawDim(){
  const s=dState,q=s.pool[s.i];
  app.innerHTML=header("④ 모델링 치수 찾기",`도면 ${q.did} · ${q.dname}`)+`
  <div class="panel">
    <div class="imgbox" onclick="openLB('${IMG(q.did)}','${esc(q.did+" "+q.dname)}')">
      <img src="${IMG(q.did)}" alt="도면 ${q.did}"><span class="zoomhint">🔍 눌러서 확대</span>
    </div>
    <div class="q">${esc(q.ask)}</div>
    <div class="row">
      <input class="numin mono" id="numin" type="number" inputmode="decimal" placeholder="?" autocomplete="off"
        onkeydown="if(event.key==='Enter')checkDim()">
      <span class="unit">${esc(q.unit||"mm")}</span>
      <button class="btn cyan" id="chk" onclick="checkDim()">확인</button>
      <button class="link" onclick="showHint()">힌트 보기</button>
    </div>
    <div class="feedback" id="fb"></div>
    <div class="row" style="margin-top:14px">
      <span class="pill">${s.i+1} / ${s.pool.length}</span>
      <span class="pill">맞힘 ${s.correct}</span>
      <div class="spacer"></div>
      <button class="btn amber" id="nextb" style="display:none" onclick="nextDim()">다음 →</button>
    </div>
    <div class="progress"><i style="width:${(s.i)/s.pool.length*100}%"></i></div>
  </div>`;
  setTimeout(()=>$("numin")&&$("numin").focus(),50);
}
function showHint(){const q=dState.pool[dState.i];const fb=$("fb");fb.className="feedback show";fb.style.background="rgba(79,209,232,.1)";fb.style.border="1px solid var(--cyan)";fb.innerHTML="💡 "+esc(q.hint||"도면 치수선을 다시 확인하세요.");}
function checkDim(){
  const s=dState; if(s.answered)return;
  const q=s.pool[s.i], v=parseFloat($("numin").value);
  if(isNaN(v)){toast("숫자를 입력하세요");return;}
  const ok=Math.abs(v-q.answer)<1e-6;
  const fb=$("fb");
  if(ok){
    s.answered=true;s.correct++;
    fb.className="feedback show ok";fb.innerHTML=`✅ 정답! <b class="mono">${q.answer}${esc(q.unit||"mm")}</b>`;
    $("chk").disabled=true;$("numin").disabled=true;$("nextb").style.display="";
  }else{
    s.tries++;
    fb.className="feedback show no";
    fb.innerHTML=`❌ 다시 · 정답이 아니에요.`+(s.tries>=2?` (힌트: ${esc(q.hint||"")})`:"");
    if(s.tries>=3){
      s.answered=true;
      fb.innerHTML=`정답은 <b class="mono">${q.answer}${esc(q.unit||"mm")}</b> 입니다. `+esc(q.hint||"");
      $("chk").disabled=true;$("numin").disabled=true;$("nextb").style.display="";
    }
  }
}
function nextDim(){const s=dState;s.i++;s.answered=false;s.tries=0;
  if(s.i>=s.pool.length){finishSession("④ 모델링 치수 찾기",s.correct,s.pool.length,"dim");return;}
  drawDim();}

/* ---------------- session result ---------------- */
const MODE_LABEL={quiz:"도면해독", match:"3D매칭", dim:"치수찾기"};
function rcReady(){return !!(window.ResultCollector&&ResultCollector.config&&ResultCollector.config.endpoint);}
function submitResult(mode,correct,total,dur){
  if(!window.ResultCollector){toast("제출 위젯을 불러오지 못했어요");return;}
  ResultCollector.config.tool=RC_BASE+" · "+(MODE_LABEL[mode]||mode);
  ResultCollector.open({score:Math.round(correct/total*100),correct,total,durationSec:dur});
}
function finishSession(title,correct,total,again){
  const pct=Math.round(correct/total*100);
  const dur=sessStart?Math.round((Date.now()-sessStart)/1000):0;
  const mm=String(Math.floor(dur/60)).padStart(2,"0"), ss=String(dur%60).padStart(2,"0");
  const msg=pct>=90?"완벽해요! 🏆":pct>=70?"잘했어요! 👍":pct>=50?"조금만 더! 💪":"복습이 필요해요 📚";
  const submitBtn=rcReady()
    ? `<button class="btn amber" onclick="submitResult('${again}',${correct},${total},${dur})">📤 선생님께 결과 제출</button>`
    : "";
  app.innerHTML=header(title,"결과")+`
  <div class="panel" style="text-align:center">
    <div style="font-size:20px;font-weight:800;margin:6px 0 2px">${msg}</div>
    <div class="statgrid">
      <div><div class="n" style="color:var(--amber)">${pct}%</div><div class="l">정답률</div></div>
      <div><div class="n" style="color:var(--cyan)">${correct}/${total}</div><div class="l">맞힌 개수</div></div>
      <div><div class="n">${mm}:${ss}</div><div class="l">걸린 시간</div></div>
    </div>
    <div class="row" style="justify-content:center">
      ${submitBtn}
      <button class="btn cyan" onclick="go('${again}')">다시 풀기</button>
      <button class="btn" onclick="go('home')">홈으로</button>
    </div>
    ${rcReady()?"":`<div class="sub" style="margin-top:12px;font-size:12px">※ 선생님이 나눠준 <b>제출용 링크</b>로 열면 ‘결과 제출’ 버튼이 나타나요.</div>`}
  </div>`;
}

/* ---------------- EDITOR ---------------- */
function renderEditor(){
  app.innerHTML=header("문제 편집 · 도면 관리","선생님용")+`
  <div class="panel">
    <div class="row">
      <button class="btn cyan" onclick="addDrawing()">＋ 도면 추가</button>
      <button class="btn" onclick="exportJSON()">⬇ JSON 내보내기</button>
      <label class="btn ghost" style="display:inline-block">⬆ JSON 불러오기
        <input type="file" accept="application/json,.json" style="display:none" onchange="importJSON(event)"></label>
      <div class="spacer"></div>
      <button class="btn ghost" style="color:var(--red)" onclick="doReset()">기본값 복원</button>
    </div>
    <div class="warn">불러온/수정한 내용은 이 브라우저에 자동 저장됩니다. 다른 기기·배포본에 반영하려면 <b>JSON 내보내기</b>로 받은 파일로 <span class="mono">data.js</span>를 교체하세요.</div>
    <div class="hr"></div>
    <div class="ed-list">
      ${DATA.map(d=>`<div class="ed-item">
        <img class="th" src="${IMG(d.id)}" onerror="this.style.opacity=.2" alt="">
        <div style="flex:1"><b>도면 ${esc(d.id)}</b> · ${esc(d.name)}
          <div class="sub">해독 ${(d.quiz||[]).length}문항 · 치수 ${(d.dims||[]).length}문항 ${d.note?"· 주서: "+esc(d.note):""}</div></div>
        <button class="btn" onclick="go('editOne','${d.id}')">편집</button>
        <button class="btn ghost" style="color:var(--red)" onclick="delDrawing('${d.id}')">삭제</button>
      </div>`).join("")}
    </div>
  </div>`;
}
function doReset(){if(confirm("모든 편집 내용을 지우고 기본 문제집으로 되돌릴까요?")){resetData();DATA=loadData();toast("복원됨");go('edit');}}
function addDrawing(){
  const id=prompt("추가할 도면 번호/ID (예: 20). 이미지는 images/ID.png, images/iso/ID.png, images/views/ID.png 로 넣어주세요.");
  if(!id)return;
  if(DATA.some(d=>d.id===id)){toast("이미 있는 ID");return;}
  DATA.push({id:id.trim(),name:"새 도면",note:"",quiz:[],dims:[]});
  saveData(DATA);go('editOne',id.trim());
}
function delDrawing(id){if(confirm(`도면 ${id} 을(를) 삭제할까요?`)){DATA=DATA.filter(d=>d.id!==id);saveData(DATA);toast("삭제됨");go('edit');}}

function renderEditOne(id){
  const d=DATA.find(x=>x.id===id); if(!d){go('edit');return;}
  app.innerHTML=header(`도면 ${d.id} 편집`,d.name)+`
  <div class="panel">
    <div class="imgbox" style="cursor:zoom-in" onclick="openLB('${IMG(d.id)}','${esc(d.id)}')">
      <img src="${IMG(d.id)}" onerror="this.parentElement.innerHTML='<div class=sub style=padding:20px>이미지 없음: images/${d.id}.png</div>'"><span class="zoomhint">🔍 확대</span>
    </div>
    <label>부품 이름</label><input type="text" id="f_name" value="${esc(d.name)}">
    <label>주서(주기) — 예: 지시없는 모따기 C2</label><input type="text" id="f_note" value="${esc(d.note||"")}">

    <div class="hr"></div>
    <div class="row"><b class="tag">① 해독 퀴즈(4지선다)</b><div class="spacer"></div>
      <button class="btn" onclick="addQ('${d.id}')">＋ 문항 추가</button></div>
    <div id="quizedit">${(d.quiz||[]).map((q,i)=>quizEditHTML(q,i)).join("")}</div>

    <div class="hr"></div>
    <div class="row"><b class="tag">④ 치수 찾기(숫자 입력)</b><div class="spacer"></div>
      <button class="btn" onclick="addD('${d.id}')">＋ 문항 추가</button></div>
    <div id="dimedit">${(d.dims||[]).map((q,i)=>dimEditHTML(q,i)).join("")}</div>

    <div class="hr"></div>
    <div class="row">
      <button class="btn cyan" onclick="saveOne('${d.id}')">💾 저장</button>
      <button class="btn ghost" onclick="go('edit')">취소</button>
    </div>
  </div>`;
}
function quizEditHTML(q,i){
  return `<div class="qedit" data-qi="${i}">
    <div class="row"><span class="tag">문항 ${i+1}</span><div class="spacer"></div>
      <button class="link" onclick="rmQ(${i})" style="color:var(--red)">삭제</button></div>
    <label>질문</label><textarea class="q_q">${esc(q.q)}</textarea>
    <label>보기 (정답 라디오를 선택)</label>
    ${[0,1,2,3].map(k=>`<div class="row" style="margin-top:4px">
      <input type="radio" name="ans_${i}" class="q_ans" value="${k}" ${q.answer===k?"checked":""}>
      <input type="text" class="q_c" value="${esc((q.choices||[])[k]||"")}" style="flex:1">
    </div>`).join("")}
    <label>해설</label><textarea class="q_ex">${esc(q.explain||"")}</textarea>
  </div>`;
}
function dimEditHTML(q,i){
  return `<div class="qedit" data-di="${i}">
    <div class="row"><span class="tag">치수 ${i+1}</span><div class="spacer"></div>
      <button class="link" onclick="rmD(${i})" style="color:var(--red)">삭제</button></div>
    <label>질문 (예: 밑판 전체 폭은?)</label><textarea class="d_ask">${esc(q.ask)}</textarea>
    <div class="row">
      <div style="flex:1"><label>정답(숫자)</label><input type="text" class="d_ans" value="${esc(q.answer)}"></div>
      <div style="width:90px"><label>단위</label><input type="text" class="d_unit" value="${esc(q.unit||"mm")}"></div>
    </div>
    <label>힌트</label><textarea class="d_hint">${esc(q.hint||"")}</textarea>
  </div>`;
}
function addQ(id){const d=DATA.find(x=>x.id===id);d.quiz=d.quiz||[];d.quiz.push({q:"",choices:["","","",""],answer:0,explain:""});saveData(DATA);go('editOne',id);}
function addD(id){const d=DATA.find(x=>x.id===id);d.dims=d.dims||[];d.dims.push({ask:"",answer:0,unit:"mm",hint:""});saveData(DATA);go('editOne',id);}
function rmQ(i){const id=curEditId();const d=DATA.find(x=>x.id===id);collectOne(d);d.quiz.splice(i,1);saveData(DATA);go('editOne',id);}
function rmD(i){const id=curEditId();const d=DATA.find(x=>x.id===id);collectOne(d);d.dims.splice(i,1);saveData(DATA);go('editOne',id);}
function curEditId(){return document.querySelector("h1").textContent.replace(/[^0-9A-Za-z]/g,"").replace("편집","");}
function collectOne(d){
  d.name=$("f_name").value.trim();
  d.note=$("f_note").value.trim();
  d.quiz=[...document.querySelectorAll("#quizedit .qedit")].map(el=>{
    const i=el.dataset.qi;
    return {
      q:el.querySelector(".q_q").value.trim(),
      choices:[...el.querySelectorAll(".q_c")].map(x=>x.value.trim()),
      answer:+ (el.querySelector('input[name="ans_'+i+'"]:checked')||{value:0}).value,
      explain:el.querySelector(".q_ex").value.trim(),
    };
  });
  d.dims=[...document.querySelectorAll("#dimedit .qedit")].map(el=>({
    ask:el.querySelector(".d_ask").value.trim(),
    answer:parseFloat(el.querySelector(".d_ans").value)||0,
    unit:el.querySelector(".d_unit").value.trim()||"mm",
    hint:el.querySelector(".d_hint").value.trim(),
  }));
}
function saveOne(id){const d=DATA.find(x=>x.id===id);collectOne(d);saveData(DATA);toast("저장됨");go('edit');}

/* export / import */
function exportJSON(){
  const body="/* 자동화설비 실기 공개도면 문제 데이터 — "+new Date().toISOString().slice(0,10)+" */\n"+
    "window.DEFAULT_DRAWINGS = "+JSON.stringify(DATA,null,2)+";\n";
  const blob=new Blob([body],{type:"application/javascript"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="data.js";a.click();
  toast("data.js 내보냄");
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      let txt=r.result;
      const m=txt.match(/DEFAULT_DRAWINGS\s*=\s*(\[[\s\S]*\])\s*;?/);
      const arr=JSON.parse(m?m[1]:txt);
      if(!Array.isArray(arr))throw 0;
      DATA=arr;saveData(DATA);toast("불러옴");go('edit');
    }catch(e){alert("불러오기 실패: JSON 형식을 확인하세요.");}
  };
  r.readAsText(f);
}

/* start */
go('home');
</script>
</body>
</html>
